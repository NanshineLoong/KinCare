services:
  api:
    build:
      context: ./backend
    environment:
      HOMEVITAL_DB_PATH: /data/homevital.db
      HOMEVITAL_JWT_SECRET: ${HOMEVITAL_JWT_SECRET:-change-me-in-production}
      HOMEVITAL_AI_BASE_URL: ${HOMEVITAL_AI_BASE_URL:-}
      HOMEVITAL_AI_API_KEY: ${HOMEVITAL_AI_API_KEY:-}
      HOMEVITAL_AI_MODEL: ${HOMEVITAL_AI_MODEL:-gpt-4.1-mini}
      HOMEVITAL_SCHEDULER_ENABLED: ${HOMEVITAL_SCHEDULER_ENABLED:-1}
      HOMEVITAL_SCHEDULER_TIMEZONE: ${HOMEVITAL_SCHEDULER_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - backend-data:/data

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-5173}:5173"

  mcp:
    build:
      context: ./mcp-server
    depends_on:
      - api
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      PORT: ${MCP_PORT:-8081}
    ports:
      - "${MCP_PORT:-8081}:8081"

volumes:
  backend-data:
