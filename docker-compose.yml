services:
  api:
    build:
      context: ./backend
    environment:
      KINCARE_DB_PATH: /data/kincare.db
      KINCARE_JWT_SECRET: ${KINCARE_JWT_SECRET:-change-me-in-production}
      KINCARE_AI_BASE_URL: ${KINCARE_AI_BASE_URL:-}
      KINCARE_AI_API_KEY: ${KINCARE_AI_API_KEY:-}
      KINCARE_AI_MODEL: ${KINCARE_AI_MODEL:-gpt-4.1-mini}
      KINCARE_SCHEDULER_ENABLED: ${KINCARE_SCHEDULER_ENABLED:-1}
      KINCARE_SCHEDULER_TIMEZONE: ${KINCARE_SCHEDULER_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - backend-data:/data

  web:
    build:
      context: ./frontend
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-5173}:5173"

  mcp:
    build:
      context: ./mcp-server
    depends_on:
      - api
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      PORT: ${MCP_PORT:-8081}
    ports:
      - "${MCP_PORT:-8081}:8081"

volumes:
  backend-data:
